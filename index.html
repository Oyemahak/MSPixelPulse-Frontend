<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="MSPixelPulse builds professional websites for small businesses in Toronto and across Canada, including WordPress, React, e-commerce, redesign, and maintenance work."
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#f6f8fc" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="canonical" href="https://mspixelpulse.vercel.app/" />
    <meta property="og:title" content="MSPixelPulse" />
    <meta
      property="og:description"
      content="Professional websites built to help small businesses build trust, present their services clearly, and grow online."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mspixelpulse.vercel.app/" />
    <meta property="og:image" content="https://mspixelpulse.vercel.app/hero/mspixelpulse-web-design-collaboration.webp" />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      try {
        const savedTheme = localStorage.getItem("mspixelpulse-theme");
        const initialTheme = savedTheme === "dark" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", initialTheme);
        document.documentElement.style.colorScheme = initialTheme;
        document.querySelector('meta[name="theme-color"]').setAttribute(
          "content",
          initialTheme === "dark" ? "#030304" : "#f6f8fc"
        );
      } catch {}
    </script>
    <title>MSPixelPulse | Toronto Website Design</title>
  </head>
  <body class="bg-ink text-textMain antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
