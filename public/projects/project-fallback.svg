  <text x="240" y="218" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="1">MSPixelPulse</text>
  <text x="240" y="820" fill="#ffffff" fill-opacity="0.84" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900">Portfolio Project</text>
