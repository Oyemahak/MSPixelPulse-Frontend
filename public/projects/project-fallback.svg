  <rect x="240" y="365" width="420" height="280" rx="28" fill="#ffffff" opacity="0.10"/>
  <rect x="710" y="365" width="490" height="58" rx="18" fill="#ffffff" opacity="0.17"/>
  <rect x="710" y="455" width="390" height="40" rx="15" fill="#ffffff" opacity="0.12"/>
